<!-- map.html -->
{% extends 'base.html' %}
{% block content %}

<div class="fixed-grid has-4-cols">
  <div class="grid">
    <div class="cell is-col-span-3">
        <div class="box">
        {{ map|safe }}
        </div>
    </div>
    <div class="cell">
        <div class="card">
            <div class="card-content">
                <div class="content">
                    <div class="field">
                        <label class="label">Name</label>
                            <div class="control">
                                <input class="input" type="text" placeholder="Text input">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
</div>

{% endblock %}
